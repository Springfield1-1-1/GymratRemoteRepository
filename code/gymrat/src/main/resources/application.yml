spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springfield_gymrat?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.springfield.gymrat.entity

server:
  port: 8080

jwt:
  secret: springfield-gymrat-secret-key-2024-please-change-in-production  # 生产环境一定要改！
  expiration:
    day: 86400      # 1天（秒）
    month: 2592000  # 30天（秒）
