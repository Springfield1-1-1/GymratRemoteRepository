spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/springfield_gymrat?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true #支持重写批量SQL语句
    #url: jdbc:mysql://localhost:3306/springfield_gymrat?serverTimezone=Asia/Shanghai
    username: springfield_gymrat
    #username: root
    password: 2YZzMbTd7yWDPDY3
    #password: 123456

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  data:
    redis:
      host: localhost
      port: 6379
      database: 1

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 打印sql
    map-underscore-to-camel-case: true  # 自动将数据库字段（下划线命名）映射到 Java 属性（驼峰命名）
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler  # 枚举类型处理器
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.springfield.gymrat.entity # 扫描实体包
  global-config:
    db-config:  # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

jwt:
  secret: springfield-gymrat-secret-key-2026-please-change-in-production
  expiration:
    day: 86400      # 1天（秒）
    month: 2592000  # 30天（秒）

aliyun:
  oss:
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket-name: springfield-gymrat

